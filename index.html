<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSScreener - Full Stride 馬市場検索ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 class="wordmark">FS<span>Screener</span></h1>
  <div class="header-right">
    <button class="theme-toggle" id="theme-toggle" aria-label="テーマ切り替え">☀️</button>
    <p class="subtitle">Full Stride 馬市場 掘り出し物検索ツール<br>ファン制作・非公式</p>
  </div>
</header>

<main>
  <section id="search-panel" class="panel">
    <p class="ticket-label">Entry Form No.01</p>
    <h2>検索条件</h2>

    <div class="field-row">
      <div class="field">
        <label for="budget">予算上限（pt）<span class="required">必須</span></label>
        <input type="number" id="budget" min="0" step="1" placeholder="例: 10000">
      </div>
      <div class="field">
        <label for="distance">希望距離（m）</label>
        <input type="number" id="distance" min="0" step="100" placeholder="例: 1800">
      </div>
    </div>

    <div class="field">
      <label>脚質</label>
      <div class="chip-row" id="running-style-chips" data-value="">
        <span class="chip active" data-value="">指定しない</span>
        <span class="chip" data-value="0">逃げ</span>
        <span class="chip" data-value="1">先行</span>
        <span class="chip" data-value="2">差し</span>
        <span class="chip" data-value="3">追込</span>
      </div>
    </div>

    <div class="field">
      <label for="surface">芝・ダート</label>
      <select id="surface">
        <option value="">どちらでも</option>
        <option value="turf">芝</option>
        <option value="dirt">ダート</option>
      </select>
    </div>

    <div class="field">
      <label for="horse-color">毛色</label>
      <select id="horse-color">
        <option value="">指定しない</option>
        <option value="0">鹿毛</option>
        <option value="1">黒鹿毛</option>
        <option value="2">青鹿毛</option>
        <option value="3">青毛</option>
        <option value="4">栗毛</option>
        <option value="5">栃栗毛</option>
        <option value="6">尾花栗毛</option>
        <option value="7">芦毛</option>
        <option value="8">白毛</option>
      </select>
    </div>

    <div class="field">
      <label>成長タイプ（複数選択可）</label>
      <div class="chip-row" id="growth-chips">
        <span class="chip" data-value="prodigy">天才</span>
        <span class="chip" data-value="early">早熟</span>
        <span class="chip" data-value="normal">普通</span>
        <span class="chip" data-value="late">晩成</span>
      </div>
    </div>

    <div class="field">
      <h3>8軸ステータス（任意・N以上で抽出）</h3>
      <div class="stat-grid" id="stat-grid">
        <!-- generated by script.js -->
      </div>
    </div>

    <button id="search-btn" class="search-btn">検索する</button>
  </section>

  <section id="results-panel" class="panel">
    <div class="results-head">
      <h2>検索結果</h2>
      <span class="results-count" id="result-count"></span>
    </div>
    <p class="hint">おすすめ度は、選択した検索条件にどれだけ強く合致しているかを示す指標です。</p>
    <div class="sort-row">
      <label for="sort-select" class="sr-only">並び替え</label>
      <select id="sort-select">
        <option value="score_desc">おすすめ度順（高い→低い）</option>
        <option value="rating_desc">レーティング高い順</option>
        <option value="rating_asc">レーティング低い順</option>
        <option value="name_asc">あいうえお順</option>
        <option value="name_desc">あいうえお逆順</option>
      </select>
    </div>
    <div class="card-stack" id="results"></div>
  </section>
</main>

<div id="detail-modal" class="modal hidden">
  <div class="modal-content panel detail-preview">
    <button id="modal-close" class="modal-close">×</button>
    <p class="ticket-label">詳細プレビュー</p>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  本ツールはファンによる非公式検索ツールです。『FULL STRIDE』の名称は BLUE BULLET の商標または登録商標です。<br>
  Created by ©Musyn Reagan / 華耀東夷堂
</footer>

<script src="script.js"></script>
</body>
</html>
